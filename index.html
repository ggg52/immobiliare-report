<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Annunci Immobiliare.it</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 24px 32px; background: #fff; color: #222; }
        h1 { font-size: 1.5em; margin-bottom: 6px; }
        .summary { font-size: 0.92em; color: #333; margin-bottom: 6px; }
        .summary b { color: #111; }
        .controls { display: flex; align-items: center; gap: 12px; margin: 14px 0 10px; flex-wrap: wrap; }
        .controls button { padding: 6px 14px; border: 1px solid #aaa; border-radius: 4px; background: #f5f5f5; cursor: pointer; font-size: 13px; }
        .controls input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 220px; }
        table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
        thead th { border-bottom: 2px solid #ccc; padding: 8px 10px; text-align: left; cursor: pointer; }
        tbody td { padding: 7px 10px; border-bottom: 1px solid #eee; }
        .price { font-weight: bold; color: #cc0000; }
        .badge { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #e6f4ea; color: #1e7e34; }
    </style>
</head>
<body>
    <h1>Annunci Immobiliare.it - Aggiornato il 06/05/2026 23:01</h1>
    <p class="summary">Totale annunci: <b id="s-tot">-</b> | Visibili: <b id="s-vis">-</b></p>
    <div class="controls">
        <input type="text" id="filtro" placeholder="🔍 Filtra..." oninput="render()">
    </div>
    <table>
        <thead><tr><th>ID</th><th>Titolo</th><th>Ubicazione</th><th>Prezzo</th><th>Stato</th><th>Link</th></tr></thead>
        <tbody id="tb"></tbody>
    </table>
    <script>
        const ads = [{"id": 123015945, "titolo": "Quadrilocale salita Marine 8, Bussana", "ubicazione": "Sanremo", "prezzo": "€ 190.000", "prezzo_num": 190000, "superficie": "N/D", "periodo": "May 2026", "periodo_sort": "2026-05", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/123015945/"}];
        function render() {
            const q = document.getElementById('filtro').value.toLowerCase();
            const lista = ads.filter(r => r.titolo.toLowerCase().includes(q) || r.ubicazione.toLowerCase().includes(q));
            document.getElementById('s-tot').textContent = ads.length;
            document.getElementById('s-vis').textContent = lista.length;
            document.getElementById('tb').innerHTML = lista.map(r => `
                <tr>
                    <td>${r.id}</td>
                    <td>${r.titolo}</td>
                    <td>${r.ubicazione}</td>
                    <td class="price">${r.prezzo}</td>
                    <td><span class="badge">✅ ${r.stato}</span></td>
                    <td><a href="${r.link}" target="_blank">Apri</a></td>
                </tr>`).join('');
        }
        render();
    </script>
</body>
</html>
