ponente-imperia-612985687.htm", "titolo": "N/D", "ubicazione": "N/D", "prezzo": "N/D", "prezzo_num": 0, "superficie": "N/D", "periodo": "N/D", "periodo_sort": "0000-00", "stato": "Visibile", "link": "https://www.subito.it/appartamenti/bilocale-riviera-ligure-di-ponente-imperia-612985687.htm"}, {"fonte": "Subito.it", "id": "https://www.subito.it/appartamenti/appartamento-sanremo-sr163vrg-imperia-644357002.htm", "titolo": "N/D", "ubicazione": "N/D", "prezzo": "N/D", "prezzo_num": 0, "superficie": "N/D", "periodo": "N/D", "periodo_sort": "0000-00", "stato": "Visibile", "link": "https://www.subito.it/appartamenti/appartamento-sanremo-sr163vrg-imperia-644357002.htm"}];
const COLORI = {"Immobiliare.it": "#cc0000", "Idealista.it": "#0070c8", "Casa.it": "#e07000", "Subito.it": "#009966"};

let filtroTesto = '';
let sortKey = 'periodo_sort';
let sortDir = 1;

// Inizializza filtri per fonte (tutte attive)
const fontiSet = [...new Set(ads.map(r => r.fonte))];
const fontiAttive = new Set(fontiSet);

// Crea pills
const pillsEl = document.getElementById('pills-container');
fontiSet.forEach(f => {
  const pill = document.createElement('span');
  pill.className = 'pill';
  pill.style.background = COLORI[f] || '#888';
  const tot = ads.filter(r => r.fonte === f).length;
  pill.textContent = f + ' (' + tot + ')';
  pill.title = 'Clicca per mostrare/nascondere';
  pill.onclick = () => {
    if (fontiAttive.has(f)) { fontiAttive.delete(f); pill.classList.add('off'); }
    else { fontiAttive.add(f); pill.classList.remove('off'); }
    render();
  };
  pillsEl.appendChild(pill);
});

function fmt(n) {
  return n > 0 ? '€ ' + n.toLocaleString('it-IT') : 'N/D';
}

function getLista() {
  return ads.filter(r => {
    if (!fontiAttive.has(r.fonte)) return false;
    if (filtroTesto) {
      const q = filtroTesto.toLowerCase();
      return (r.titolo + ' ' + r.ubicazione + ' ' + r.fonte).toLowerCase().includes(q);
    }
    return true;
  });
}

function render() {
  const lista = getLista();
  lista.sort((a, b) => {
    let vA = a[sortKey], vB = b[sortKey];
    if (typeof vA === 'string') vA = vA.toLowerCase();
    if (typeof vB === 'string') vB = vB.toLowerCase();
    return vA > vB ? sortDir : vA < vB ? -sortDir : 0;
  });

  ['fonte','titolo','ubicazione','prezzo_num','superficie','periodo_sort'].forEach(k => {
    const el = document.getElementById('arr-' + k);
    if (el) el.textContent = k === sortKey ? (sortDir === 1 ? '▲' : '▼') : '';
  });

  document.getElementById('s-tot').textContent = lista.length;

  const tb = document.getElementById('tb');
  if (!lista.length) {
    tb.innerHTML = '<tr><td colspan="7" style="padding:20px;text-align:center;color:#aaa">Nessun risultato.</td></tr>';
    return;
  }
  tb.innerHTML = lista.map(r => `
    <tr>
      <td><span class="fonte-badge" style="background:${COLORI[r.fonte] || '#888'}">${r.fonte}</span></td>
      <td>${r.titolo}</td>
      <td style="color:#555">${r.ubicazione}</td>
      <td class="price">${fmt(r.prezzo_num)}</td>
      <td style="color:#555">${r.superficie}</td>
      <td class="periodo">${r.periodo}</td>
      <td><a href="${r.link}" class="link-btn" target="_blank">Apri</a></td>
    </tr>`).join('');
}

function sort(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  render();
}

function filtra() {
  filtroTesto = document.getElementById('filtro').value;
  render();
}

render();
</script>
