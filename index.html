<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Annunci Immobiliare.it</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 24px 32px; background: #fff; color: #222; }
        h1 { font-size: 1.5em; margin-bottom: 6px; }
        .summary { font-size: 0.92em; color: #333; margin-bottom: 6px; }
        .summary b { color: #111; }
        .controls { display: flex; align-items: center; gap: 12px; margin: 14px 0 10px; flex-wrap: wrap; }
        .controls button { padding: 6px 14px; border: 1px solid #aaa; border-radius: 4px; background: #f5f5f5; cursor: pointer; font-size: 13px; display: none; }
        .controls button:hover { background: #e0e0e0; }
        .controls input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 220px; }
        .hint { font-size: 0.8em; color: #888; }
        table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
        thead th { border-bottom: 2px solid #ccc; padding: 8px 10px; text-align: left; cursor: pointer; user-select: none; white-space: nowrap; color: #333; }
        thead th:hover { color: #000; text-decoration: underline; }
        tbody td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr.nascosto td { color: #aaa; }
        tr.visibile:hover td { background: #f7f9ff; }
        tr.nascosto:hover td { background: #fafafa; }
        .price { font-weight: bold; }
        tr.visibile .price { color: #cc0000; }
        tr.nascosto .price { color: #aaa; }
        .periodo { white-space: nowrap; }
        .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
        .badge.visibile { background: #e6f4ea; color: #1e7e34; }
        .badge.nascosto { background: #f0f0f0; color: #888; }
        .link-btn { color: #0066cc; text-decoration: none; font-size: 13px; }
        .link-btn:hover { text-decoration: underline; }
        .sort-arrow { font-size: 10px; margin-left: 3px; color: #666; }
    </style>
</head>
<body>
    <h1>Annunci Immobiliare.it</h1>
    <p class="summary">
        Totale annunci: <b id="s-tot">-</b> &mdash;
        Visibili: <b id="s-vis">-</b> &mdash;
        Nascosti: <b id="s-nas">-</b> &mdash;
        Prezzo medio (visibili): <b id="s-avg">-</b>
    </p>

    <div class="controls">
        <button id="btn-nascosti" onclick="toggleNascosti()">👁 Mostra nascosti</button>
        <input type="text" id="filtro" placeholder="🔍 Filtra per titolo o città..." oninput="filtra()">
        <span class="hint">Clicca su un'intestazione per ordinare.</span>
    </div>

    <table>
        <thead>
            <tr>
                <th onclick="sort('id')">ID <span class="sort-arrow" id="arr-id"></span></th>
                <th onclick="sort('titolo')">Titolo <span class="sort-arrow" id="arr-titolo"></span></th>
                <th onclick="sort('ubicazione')">Ubicazione <span class="sort-arrow" id="arr-ubicazione"></span></th>
                <th onclick="sort('prezzo_num')">Prezzo <span class="sort-arrow" id="arr-prezzo_num"></span></th>
                <th onclick="sort('superficie')">Sup. <span class="sort-arrow" id="arr-superficie"></span></th>
                <th onclick="sort('periodo_sort')">Periodo stimato <span class="sort-arrow" id="arr-periodo_sort"></span></th>
                <th onclick="sort('stato')">Stato <span class="sort-arrow" id="arr-stato"></span></th>
                <th>Link</th>
            </tr>
        </thead>
        <tbody id="tb"></tbody>
    </table>

    <script>
        const ads = [{"id": 128751524, "titolo": "Villa unifamiliare via papa giovanni viii 5, Oneglia", "ubicazione": "Imperia", "prezzo": "€ 170.000", "prezzo_num": 170000, "superficie": "75 m²", "periodo": "Mag 2026", "periodo_sort": "2026-05", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/128751524/"}, {"id": 128707886, "titolo": "Trilocale via Sant'Agata 26, Porto Maurizio", "ubicazione": "Imperia", "prezzo": "€ 189.000", "prezzo_num": 189000, "superficie": "90 m²", "periodo": "Mag 2026", "periodo_sort": "2026-05", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/128707886/"}, {"id": 128701552, "titolo": "Trilocale via trento 23, Porto Maurizio", "ubicazione": "Imperia", "prezzo": "€ 198.000", "prezzo_num": 198000, "superficie": "100 m²", "periodo": "Mag 2026", "periodo_sort": "2026-05", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/128701552/"}, {"id": 128646464, "titolo": "Quadrilocale via Felice Cascione 57, Porto Maurizio", "ubicazione": "Imperia", "prezzo": "€ 167.000", "prezzo_num": 167000, "superficie": "75 m²", "periodo": "Mag 2026", "periodo_sort": "2026-05", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/128646464/"}, {"id": 128493142, "titolo": "Appartamento viale Giacomo Matteotti, Porto Maurizio", "ubicazione": "Imperia", "prezzo": "€ 165.000", "prezzo_num": 165000, "superficie": "108 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/128493142/"}, {"id": 128480212, "titolo": "Appartamento via Silvio Bonfante, Oneglia", "ubicazione": "Imperia", "prezzo": "€ 240.000", "prezzo_num": 240000, "superficie": "120 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/128480212/"}, {"id": 128383838, "titolo": "Bilocale via Cipressa 24", "ubicazione": "San Lorenzo al Mare", "prezzo": "€ 208.000", "prezzo_num": 208000, "superficie": "78 m²", "periodo": "A "prezzo_num": 219000, "superficie": "110 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/128076706/"}, {"id": 128040026, "titolo": "Appartamento via De Tommaso 30, Porto Maurizio", "ubicazione": "Imperia", "prezzo": "€ 178.000", "prezzo_num": 178000, "superficie": "101 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/128040026/"}, {"id": 128037378, "titolo": "Appartamento via Pietrabruna 170", "ubicazione": "San Lorenzo al Mare", "prezzo": "€ 210.000", "prezzo_num": 210000, "superficie": "98 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/128037378/"}, {"id": 128034692, "titolo": "Trilocale via Bent. Amilcare Nuvolone 69, Centro", "ubicazione": "Taggia", "prezzo": "€ 210.000", "prezzo_num": 210000, "superficie": "80 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/128034692/"}, {"id": 127966356, "titolo": "Trilocale via Viali, Centro", "ubicazione": "San Bartolomeo al Mare", "prezzo": "€ 239.000", "prezzo_num": 239000, "superficie": "100 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/127966356/"}, {"id": 127847108, "titolo": "Trilocale via Paoletti 46, Porto Maurizio", "ubicazione": "Imperia", "prezzo": "€ 165.000", "prezzo_num": 165000, "superficie": "75 m²", "periodo": "Mar 2026", "periodo_sort": "2026-03", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/127847108/"}, {"id": 127795942, "titolo": "Trilocale via Giuseppe Airenti, Porto Maurizio", "ubicazione": "Imperia", "prezzo": "€ 157.000", "prezzo_num": 157000, "superficie": "70 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/127795942/"}, {"id": 127769882, "titolo": "Trilocale via Ivanoe Amoretti, Porto Maurizio", "ubicazione": "Imperia", "prezzo": "€ 195.000", "prezzo_num": 195000, "superficie": "90 m²", "periodo": "Mar 2026", "periodo_sort": "2026-03", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/127769882/"}, {"id": 127746092, "titolo": "Trilocale via Sclavi 25", "ubicazione": "San Lorenzo al Mare", "prezzo": "€ 219.000", "prezzo_num": 219000, "superficie": "99 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/127746092/"}, {"id": 127715722, "titolo": "Trilocale via Aurelia Ponente 52", "ubicazione": "Santo Stefano al Mare", "prezzo": "€ 220.000", "prezzo_num": 220000, "superficie": "70 m²", "periodo": "Mar 2026", "periodo_sort": "2026-03", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/127715722/"}, {"id": 127344029, "titolo": "Appartamento via Giuseppe Verdi 30, Porto Maurizio", "ubicazione": "Imperia", "prezzo": "€ 189.000", "prezzo_num": 189000, "superficie": "100 m²", "periodo": "Mar 2026", "periodo_sort": "2026-03", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/127344029/"}, {"id": 127332941, "titolo": "Trilocale via Civezza snc", "ubicazione": "San Lorenzo al Mare", "prezzo": "€ 149.000", "prezzo_num": 149000, "superficie": "75 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/127332941/"}, {"id": 127297415, "titolo": "Trilocale via Garibaldi", "ubicazione": "Riva Ligure", "prezzo": "€ 260.000", "prezzo_num": 260000, "superficie": "75 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/127297415/"}, {"id": 126871615, "titolo": "Quadrilocale via della Stazione, Centro", "ubicazione": "Taggia", "prezzo": "€ 250.000", "prezzo_num": 250000, "superficie": "105 m²", "periodo": "Apr 2026", "periodo_sort": "2026-04", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/126871615/"}, {"id": 126810319, "titolo": "Quadrilocale via 25 Aprile 25, Oneglia", "ubicazione": "Imperia", "prezzo": "€ 250.000", "prezzo_num": 250000, "superficie": "100 m²", "periodo": "Mar 2026", "periodo_sort": "2026-03", "stato": "Visibile", "link": "https://www.immobiliare.it/annunci/126810319/"}];
        let mostraNascosti = false;
        let filtroTesto = '';
        let sortKey = 'periodo_sort';
        let sortDir = 1;

        function fmt(n) {
            return n > 0 ? '€ ' + n.toLocaleString('it-IT') : 'N/D';
        }

        function aggiornaStats(lista) {
            const visibili = lista.filter(r => r.stato === 'Visibile');
            const prezzi = visibili.map(r => r.prezzo_num).filter(p => p >= 10000 && p <= 5000000);
            const media = prezzi.length ? Math.round(prezzi.reduce((a, b) => a + b, 0) / prezzi.length) : 0;
            document.getElementById('s-tot').textContent = lista.length;
            document.getElementById('s-vis').textContent = visibili.length;
            document.getElementById('s-nas').textContent = lista.length - visibili.length;
            document.getElementById('s-avg').textContent = media ? fmt(media) : 'N/D';
        }

        function getLista() {
            return ads.filter(r => {
                if (!mostraNascosti && r.stato === 'Nascosto') return false;
                if (filtroTesto) {
                    const q = filtroTesto.toLowerCase();
                    return r.titolo.toLowerCase().includes(q) || r.ubicazione.toLowerCase().includes(q);
                }
                return true;
            });
        }

        function render() {
            const lista = getLista();
            lista.sort((a, b) => {
                let vA = a[sortKey], vB = b[sortKey];
                if (typeof vA === 'string') vA = vA.toLowerCase();
                if (typeof vB === 'string') vB = vB.toLowerCase();
                return vA > vB ? sortDir : vA < vB ? -sortDir : 0;
            });

            ['id','titolo','ubicazione','prezzo_num','superficie','periodo_sort','stato'].forEach(k => {
                const el = document.getElementById('arr-' + k);
                if (el) el.textContent = k === sortKey ? (sortDir === 1 ? '▲' : '▼') : '';
            });

            const tb = document.getElementById('tb');
            if (!lista.length) {
                tb.innerHTML = '<tr><td colspan="8" style="padding:20px;text-align:center;color:#aaa">Nessun risultato.</td></tr>';
                aggiornaStats(lista);
                return;
            }

            tb.innerHTML = lista.map(r => `
                <tr class="${r.stato.toLowerCase()}">
                    <td style="color:#999;font-size:12px">${r.id}</td>
                    <td>${r.titolo}</td>
                    <td style="color:#555">${r.ubicazione}</td>
                    <td class="price">${r.prezzo}</td>
                    <td style="color:#555">${r.superficie}</td>
                    <td class="periodo" style="color:#444">${r.periodo}</td>
                    <td><span class="badge ${r.stato.toLowerCase()}">${r.stato === 'Visibile' ? '✅' : '🙈'} ${r.stato}</span></td>
                    <td><a href="${r.link}" class="link-btn" target="_blank">Apri</a></td>
                </tr>`).join('');

            aggiornaStats(lista);
        }

        function sort(key) {
            if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
            render();
        }

        function filtra() {
            filtroTesto = document.getElementById('filtro').value;
            render();
        }

        function toggleNascosti() {
            mostraNascosti = !mostraNascosti;
            document.getElementById('btn-nascosti').textContent = mostraNascosti ? '🙈 Nascondi nascosti' : '👁 Mostra nascosti';
            render();
        }

        render();
    </script>
</body>
</html>
